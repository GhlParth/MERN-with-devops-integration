services:

  backend:
    image: ghcr.io/ghlparth/taskflow-backend:latest
    container_name: taskflow-backend
    restart: always
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI}
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - taskflow-network

  frontend:
    image: ghcr.io/ghlparth/taskflow-frontend:latest
    container_name: taskflow-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - taskflow-network

networks:
  taskflow-network:
    driver: bridge