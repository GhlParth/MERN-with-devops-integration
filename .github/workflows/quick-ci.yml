name: Quick CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quick-check:
    runs-on: ubuntu-latest
    name: Quick Checks
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install backend dependencies
        run: npm install 
      
      - name: Backend - Verify syntax
        run: |
          node -c server.js
          echo "✅ Backend syntax valid"
      
      - name: Backend - Check structure
        run: |
          test -f package.json && echo "✅ package.json found"
          test -f .env.example && echo "✅ .env.example found"
      
      - name: Install frontend dependencies
        run: | 
          cd client
          npm install
      
      - name: Frontend - Build check
        run: |
          cd client 
          npm run build
      
      - name: Frontend - Verify structure
        run: |
          test -f client/public/index.html && echo "✅ index.html found"
          test -f client/src/App.js && echo "✅ App.js found"
      
      - name: Docker - Verify files
        run: |
          test -f Dockerfile && echo "✅ Backend Dockerfile found"
          test -f client/Dockerfile && echo "✅ Frontend Dockerfile found"
          test -f docker-compose.yml && echo "✅ docker-compose.yml found"
      
      - name: Check for secrets
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r "password123\|admin.*password\|jwt.*secret" \
            --include="*.js" --include="*.ts" \
            . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=build 2>/dev/null | grep -v ".env.example"; then
            echo "❌ WARNING: Hardcoded credentials found"
            exit 1
          fi
          
          echo "✅ No hardcoded credentials found"
      
      - name: Summary
        run: |
          echo ""
          echo "🎉 All quick checks passed!"
          echo "✅ Backend verified"
          echo "✅ Frontend built successfully"
          echo "✅ Docker files present"
          echo "✅ No critical issues found"