name: CI — Validate on develop

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:

  backend-validate:
    name: Backend — Install & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  frontend-validate:
    name: Frontend — Install, Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm install

      - name: Run ESLint
        working-directory: ./client
        run: npm run lint

      - name: Build check
        working-directory: ./client
        run: npm run build
        env:
          CI: false

  docker-build-check:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend-validate, frontend-validate]
    steps:
      - uses: actions/checkout@v3

      - name: Build backend image
        run: docker build -t taskflow-backend:ci-test .

      - name: Build frontend image
        run: docker build -t taskflow-frontend:ci-test ./client