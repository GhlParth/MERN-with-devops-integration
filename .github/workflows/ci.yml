name: CI — Validate on develop

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Backend — lint + test
  # ─────────────────────────────────────────
  backend-ci:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run backend tests
        run: npm test
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI_TEST }}
          PORT: 5001

  # ─────────────────────────────────────────
  # JOB 2: Frontend — lint + test + build
  # ─────────────────────────────────────────
  frontend-ci:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm install

      - name: Run ESLint
        working-directory: ./client
        run: npm run lint

      - name: Run frontend tests
        working-directory: ./client
        run: npm test -- --watchAll=false --coverage --passWithNoTests
        env:
          CI: true

      - name: Build check
        working-directory: ./client
        run: npm run build
        env:
          CI: false  # treat warnings as warnings, not errors

  # ─────────────────────────────────────────
  # JOB 3: Docker build verification
  # Runs only after both CI jobs pass
  # ─────────────────────────────────────────
  docker-build-check:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend image (no push)
        run: |
          docker build -t taskflow-backend:ci-test .
          echo "Backend image built successfully"

      - name: Build frontend image (no push)
        run: |
          docker build -t taskflow-frontend:ci-test ./client
          echo "Frontend image built successfully"

      - name: Verify containers start correctly
        run: |
          docker run -d --name backend-test \
            -e NODE_ENV=test \
            -e MONGODB_URI=${{ secrets.MONGODB_URI_TEST }} \
            -e PORT=5001 \
            -p 5001:5001 \
            taskflow-backend:ci-test

          # Give it a few seconds to start
          sleep 5

          # Hit the root endpoint
          curl --fail http://localhost:5001 || (docker logs backend-test && exit 1)

          docker stop backend-test
          docker rm backend-test