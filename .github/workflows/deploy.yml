name: Deploy to EC2

on:
  # Automatically runs after build.yml completes successfully
  workflow_run:
    workflows: ["Build and Push Images to GHCR"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Only deploy if the build workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            mkdir -p /home/ubuntu/taskflow
            cd /home/ubuntu/taskflow

            # Write .env from GitHub Secrets
            echo "${{ secrets.ENV_FILE }}" > .env

            # Pull latest docker-compose.yml from main branch
            curl -fsSL https://raw.githubusercontent.com/GhlParth/mern-with-devops-integration/main/docker-compose.yml -o docker-compose.yml

            # Log in to GHCR
            echo "${{ secrets.TOKEN_GITHUB }}" | docker login ghcr.io -u GhlParth --password-stdin

            # Pull latest images
            docker pull ghcr.io/ghlparth/taskflow-backend:latest
            docker pull ghcr.io/ghlparth/taskflow-frontend:latest

            # Restart containers
            docker compose down
            docker compose up -d

            docker image prune -f

            echo "Deployment complete!"